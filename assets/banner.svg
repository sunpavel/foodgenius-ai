<svg width="2400" height="1350" viewBox="0 0 2400 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="blur120" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="120"/>
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- base -->
  <rect width="2400" height="1350" fill="#0a0a0f"/>

  <!-- ambient glow -->
  <circle cx="2200" cy="120" r="320" fill="#34d399" opacity="0.16" filter="url(#blur120)"/>
  <circle cx="180" cy="1250" r="360" fill="#22d3ee" opacity="0.13" filter="url(#blur120)"/>
  <circle cx="1450" cy="700" r="280" fill="#34d399" opacity="0.06" filter="url(#blur120)"/>

  <!-- ════ LEFT: brand ════ -->
  <!-- pill badge -->
  <rect x="120" y="240" width="430" height="64" rx="32" fill="rgba(52,211,153,0.10)" stroke="#34d399" stroke-opacity="0.45" stroke-width="2"/>
  <text x="335" y="283" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="4" fill="#34d399">TELEGRAM MINI APP</text>

  <!-- title -->
  <text x="116" y="438" font-family="Helvetica, Arial, sans-serif" font-size="124" font-weight="800" letter-spacing="-2">
    <tspan fill="url(#accentH)">FoodGenius</tspan><tspan dx="28" fill="#f2f2f7">AI</tspan>
  </text>

  <!-- subtitle -->
  <text x="120" y="540" font-family="Helvetica, Arial, sans-serif" font-size="46" fill="#c7c7d1">Меню на неделю, рецепты и список</text>
  <text x="120" y="602" font-family="Helvetica, Arial, sans-serif" font-size="46" fill="#c7c7d1">покупок — за 30 секунд</text>

  <!-- feature chips -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="600">
    <rect x="120" y="668" width="270" height="62" rx="31" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <text x="255" y="710" text-anchor="middle" fill="#9d9da8">AI-генерация</text>
    <rect x="412" y="668" width="200" height="62" rx="31" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <text x="512" y="710" text-anchor="middle" fill="#9d9da8">КБЖУ</text>
    <rect x="634" y="668" width="290" height="62" rx="31" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <text x="779" y="710" text-anchor="middle" fill="#9d9da8">21 блюдо/нед</text>
  </g>

  <!-- bottom hint -->
  <g transform="translate(120 800)">
    <g transform="translate(0 0) scale(2.1)" fill="none" stroke="#34d399" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="m12 3 1.9 5.7a2 2 0 0 0 1.3 1.3L21 12l-5.8 1.9a2 2 0 0 0-1.3 1.3L12 21l-1.9-5.8a2 2 0 0 0-1.3-1.3L3 12l5.8-1.9a2 2 0 0 0 1.3-1.3L12 3z"/>
    </g>
    <text x="70" y="36" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#6b6b76">Семейные порции · диеты · любой бюджет</text>
  </g>

  <!-- ════ RIGHT: UI mockup cards ════ -->
  <g filter="url(#cardShadow)">
    <!-- Card 1: breakfast (with gradient border) -->
    <g transform="translate(1330 180)">
      <rect width="920" height="200" rx="40" fill="#14141c" stroke="url(#accent)" stroke-width="3"/>
      <rect x="32" y="40" width="120" height="120" rx="32" fill="rgba(251,191,36,0.14)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
      <!-- sun icon -->
      <g transform="translate(56 64) scale(3)" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
      </g>
      <text x="184" y="78" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="3" fill="#8e8e9b">ЗАВТРАК</text>
      <text x="184" y="128" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#f2f2f7">Овсяная каша с ягодами</text>
      <text x="184" y="172" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#8e8e9b">10 мин  ·  <tspan fill="#fbbf24">380 ккал</tspan>  ·  <tspan fill="#34d399" font-weight="700">Б</tspan> 12  <tspan fill="#fbbf24" font-weight="700">Ж</tspan> 9  <tspan fill="#22d3ee" font-weight="700">У</tspan> 62</text>
    </g>

    <!-- Card 2: lunch -->
    <g transform="translate(1380 420)">
      <rect width="920" height="200" rx="40" fill="#13131b" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
      <rect x="32" y="40" width="120" height="120" rx="32" fill="rgba(52,211,153,0.14)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
      <!-- leaf icon -->
      <g transform="translate(56 64) scale(3)" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
        <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
      </g>
      <text x="184" y="78" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="3" fill="#8e8e9b">ОБЕД</text>
      <text x="184" y="128" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#f2f2f7">Тёплый салат с говядиной</text>
      <text x="184" y="172" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#8e8e9b">25 мин  ·  <tspan fill="#fbbf24">490 ккал</tspan>  ·  <tspan fill="#34d399" font-weight="700">Б</tspan> 32  <tspan fill="#fbbf24" font-weight="700">Ж</tspan> 28  <tspan fill="#22d3ee" font-weight="700">У</tspan> 24</text>
    </g>

    <!-- Card 3: dinner -->
    <g transform="translate(1430 660)">
      <rect width="920" height="200" rx="40" fill="#13131b" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
      <rect x="32" y="40" width="120" height="120" rx="32" fill="rgba(167,139,250,0.16)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
      <!-- moon icon -->
      <g transform="translate(56 64) scale(3)" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </g>
      <text x="184" y="78" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="3" fill="#8e8e9b">УЖИН</text>
      <text x="184" y="128" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#f2f2f7">Запечённая треска</text>
      <text x="184" y="172" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#8e8e9b">35 мин  ·  <tspan fill="#fbbf24">420 ккал</tspan>  ·  <tspan fill="#34d399" font-weight="700">Б</tspan> 38  <tspan fill="#fbbf24" font-weight="700">Ж</tspan> 10  <tspan fill="#22d3ee" font-weight="700">У</tspan> 40</text>
    </g>

    <!-- Card 4: shopping progress -->
    <g transform="translate(1480 900)">
      <rect width="920" height="180" rx="40" fill="#13131b" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
      <text x="40" y="72" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#8e8e9b">Список покупок</text>
      <text x="880" y="72" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="800" fill="url(#accentH)">36 / 54</text>
      <rect x="40" y="104" width="840" height="20" rx="10" fill="rgba(255,255,255,0.07)"/>
      <rect x="40" y="104" width="560" height="20" rx="10" fill="url(#accentH)"/>
    </g>
  </g>
</svg>
